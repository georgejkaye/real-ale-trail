networks:
  web:
    external: true
  internal:
    external: false
services:
  codegen:
    build:
      context: codegen
      dockerfile: Dockerfile
    environment:
      OUTPUT_MODULE_NAME: api.db
      WATCH_FILES: 0
      ROLL_SCRIPTS: 1
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_PASSWORD_FILE: /run/secrets/db_secret
    volumes:
      - ./db/code:/app/input
      - ./api/src/api:/app/output
    networks:
      - internal
    secrets:
      - db_secret
  data:
    depends_on:
      codegen:
        condition: service_completed_successfully
    build:
      context: api
      dockerfile: Dockerfile.data
      args:
        POETRY_VERSION: 2.3.2
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_PASSWORD_FILE: /run/secrets/db_secret
    networks:
      - internal
    secrets:
      - db_secret
  api:
    depends_on:
      data:
        condition: service_completed_successfully
      codegen:
        condition: service_completed_successfully
    build:
      context: api
      dockerfile: Dockerfile.prod
      args:
        POETRY_VERSION: 2.3.2
    ports:
      - ${API_PORT}:${API_PORT}
    environment:
      API_ENV: prod
      API_PORT: ${API_PORT:-8000}
      CLIENT_HOST: ${CLIENT_HOST}
      CLIENT_PROTOCOL: ${CLIENT_PROTOCOL:-https}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: /run/secrets/db_secret
      FROM_EMAIL: ${FROM_EMAIL}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: /run/secrets/smtp_secret
      USER_SECRET: /run/secrets/user_secret
    volumes:
      - ./api/src:/app/src
    secrets:
      - db_secret
      - user_secret
      - smtp_secret
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:$$API_PORT/ || exit 1"]
      interval: 10s
      timeout: 1s
      retries: 100
      start_period: 0s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.realaletrail_api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.realaletrail_api.tls=true"
      - "traefik.http.routers.realaletrail_api.tls.certresolver=lets-encrypt"
      - "traefik.http.services.realaletrail_api.loadbalancer.server.port=${API_PORT:-8000}"
  client:
    depends_on:
      api:
        condition: service_healthy
      codegen:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: client/Dockerfile.prod
      args:
        CLIENT_PORT: ${CLIENT_PORT:-3000}
        API_PROTOCOL: ${API_PROTOCOL:-https}
        API_HOST: ${API_HOST}
        POETRY_VERSION: 2.3.2
    ports:
      - ${CLIENT_PORT:-3000}:${CLIENT_PORT:-3000}
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:$$CLIENT_PORT/ || exit 1"]
      interval: 10s
      timeout: 1s
      retries: 100
      start_period: 0s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.realaletrail_client.rule=Host(`${CLIENT_HOST}`)"
      - "traefik.http.routers.realaletrail_client.tls=true"
      - "traefik.http.routers.realaletrail_client.tls.certresolver=lets-encrypt"
      - "traefik.http.services.realaletrail_client.loadbalancer.server.port=${CLIENT_PORT:-3000}"
secrets:
  smtp_secret:
    file: smtp.secret
  db_secret:
    file: db.secret
  user_secret:
    file: user.secret
