networks:
  internal:
    external: false
services:
  data:
    build:
      context: data
      dockerfile: Dockerfile
    volumes:
      - ./db:/db
  db:
    image: postgres
    depends_on:
      data:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: realaletrail
      POSTGRES_DB: realaletrail
      POSTGRES_PASSWORD: realaletrail
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/.populate/:/docker-entrypoint-initdb.d/
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 1s
      retries: 500
      start_period: 0s
  codegen:
    build:
      context: codegen
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      OUTPUT_MODULE_NAME: api.db
      WATCH_FILES: 1
      ROLL_SCRIPTS: 1
      DB_HOST: db
      DB_USER: realaletrail
      DB_NAME: realaletrail
      DB_PASSWORD_FILE: /run/secrets/db_secret
    volumes:
      - ./db/code:/app/input
      - ./api/src/api:/app/output
    networks:
      - internal

